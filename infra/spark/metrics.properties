# Spark metrics → Prometheus. The built-in PrometheusServlet exposes driver/app metrics in
# Prometheus exposition format on the Spark UI port (4040), scraped by the prometheus
# container. Combined with spark.ui.prometheus.enabled (executor metrics) and
# spark.sql.streaming.metricsEnabled (per-query streaming metrics) set on the SparkSession,
# this surfaces pipeline health — input rows/sec, batch duration, processing rate, state —
# i.e. observability of the *system*, complementing the data-quality/drift metrics in Redis.
*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
*.sink.prometheusServlet.path=/metrics/prometheus
master.sink.prometheusServlet.path=/metrics/master/prometheus
applications.sink.prometheusServlet.path=/metrics/applications/prometheus

# Useful JVM/executor source metrics (heap, GC, etc.).
*.source.jvm.class=org.apache.spark.metrics.source.JvmSource
