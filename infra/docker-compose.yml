name: sensor-stream

services:

  # === 📨 1. MESSAGE BROKER (KAFKA) ===
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - stream-net

  kafka-broker:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-broker
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: LISTENER_INTERNAL://kafka-broker:9092,LISTENER_EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: LISTENER_INTERNAL:PLAINTEXT,LISTENER_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - stream-net

  # === ⚡ 2. FAST STORAGE (REDIS) ===
  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports:
      - "6379:6379"
      - "8001:8001"
    networks:
      - stream-net

  # === 📊 3. DASHBOARD (GRAFANA) ===
  grafana-ui:
    image: grafana/grafana:latest
    container_name: grafana-ui
    ports:
      - "3000:3000"
    environment:
      - GF_INSTALL_PLUGINS=redis-datasource
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - stream-net

  # === 🌡️ 4. IOT SIMULATOR (Our Python Script) ===
  simulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.simulator
    container_name: simulator
    depends_on:
      - kafka-broker
    environment:
      - KAFKA_BROKER=kafka-broker:9092 # Use the internal Docker network address for Kafka
    networks:
      - stream-net

  # === 🧠 5. SPARK TRANSFORMER (Our PySpark Script) ===
  spark-processor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.spark
    container_name: spark-processor
    depends_on:
      - kafka-broker
      - redis
    ports:
      - "4040:4040"
    environment:
      - KAFKA_BROKER=kafka-broker:9092
      - REDIS_HOST=redis
      - CHECKPOINT_DIR=/tmp/spark-checkpoints
    networks:
      - stream-net
  # === 📈 6. DASHBOARD (KAFKA-UI & REDIS-INSIGHT) ===
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - stream-net
      
 # === 🧑‍🔬 7. REDIS-INSIGHT (For Redis Visualization) ===
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
      - "5540:5540"
    networks:
      - stream-net

networks:
  stream-net:
    driver: bridge