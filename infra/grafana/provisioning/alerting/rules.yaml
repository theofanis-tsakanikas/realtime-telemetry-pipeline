          description: "drift:humidity:z exceeded the 3 sigma control limit."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: redis-iot
            model:
              refId: A
              datasource: { type: redis-datasource, uid: redis-iot }
              type: timeSeries
              command: ts.range
              keyName: drift:humidity:z
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: math, datasource: { type: __expr__, uid: __expr__ }, expression: "abs($A)" }
          - refId: C
            datasourceUid: __expr__
            model: { refId: C, type: reduce, datasource: { type: __expr__, uid: __expr__ }, expression: B, reducer: last }
          - refId: D
            datasourceUid: __expr__
            model:
              refId: D
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: C
              conditions:
                - evaluator: { type: gt, params: [3] }

      - uid: drift-pressure
        title: Pressure drift (>3 sigma)
        condition: D
        for: 1m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning, team: data-quality }
        annotations:
          summary: "Pressure has drifted beyond 3 sigma from its baseline"
          description: "drift:pressure:z exceeded the 3 sigma control limit."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: redis-iot
            model:
              refId: A
              datasource: { type: redis-datasource, uid: redis-iot }
              type: timeSeries
              command: ts.range
              keyName: drift:pressure:z
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: math, datasource: { type: __expr__, uid: __expr__ }, expression: "abs($A)" }
          - refId: C
            datasourceUid: __expr__
            model: { refId: C, type: reduce, datasource: { type: __expr__, uid: __expr__ }, expression: B, reducer: last }
          - refId: D
            datasourceUid: __expr__
            model:
              refId: D
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: C
              conditions:
                - evaluator: { type: gt, params: [3] }
