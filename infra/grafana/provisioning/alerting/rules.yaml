# Provisioned drift alerts — one rule PER metric, each querying a single drift z-score
# series (TS.RANGE drift:<metric>:z). Single-series queries avoid the multi-frame label
# collision that a TS.MRANGE-of-all-metrics produces in Grafana's expression engine.
#
# Per rule:  A  TS.RANGE drift:<metric>:z   →  B math abs($A)  →  C reduce last(B)  →
#            D threshold C > 3   (the 3 sigma control limit). Routed to Slack via team label.
apiVersion: 1

groups:
  - orgId: 1
    name: data-quality
    folder: Data Quality
    interval: 1m
    rules:
      - uid: drift-temperature
        title: Temperature drift (>3 sigma)
        condition: D
        for: 1m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning, team: data-quality }
        annotations:
          summary: "Temperature has drifted beyond 3 sigma from its baseline"
          description: "drift:temperature:z exceeded the 3 sigma control limit — the reading distribution shifted even though individual values may still be in range."
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: redis-iot
            model:
              refId: A
              datasource: { type: redis-datasource, uid: redis-iot }
              type: timeSeries
              command: ts.range
              keyName: drift:temperature:z
          - refId: B
            datasourceUid: __expr__
            model: { refId: B, type: math, datasource: { type: __expr__, uid: __expr__ }, expression: "abs($A)" }
          - refId: C
            datasourceUid: __expr__
            model: { refId: C, type: reduce, datasource: { type: __expr__, uid: __expr__ }, expression: B, reducer: last }
          - refId: D
            datasourceUid: __expr__
            model:
              refId: D
              type: threshold
              datasource: { type: __expr__, uid: __expr__ }
              expression: C
              conditions:
                - evaluator: { type: gt, params: [3] }

      - uid: drift-humidity
        title: Humidity drift (>3 sigma)
        condition: D
        for: 1m
        noDataState: OK
        execErrState: Error
        labels: { severity: warning, team: data-quality }
