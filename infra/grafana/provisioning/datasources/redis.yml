apiVersion: 1

datasources:
  - name: Redis
    # Stable uid so the provisioned dashboard JSON can reference this
    # datasource deterministically.
    uid: redis-iot
    type: redis-datasource
    access: proxy
    url: redis://redis:6379
    isDefault: true
    editable: true
    # Password comes from the REDIS_PASSWORD env var passed to the Grafana
    # container (Grafana interpolates $VARS in provisioning files).
    secureJsonData:
      password: $REDIS_PASSWORD
