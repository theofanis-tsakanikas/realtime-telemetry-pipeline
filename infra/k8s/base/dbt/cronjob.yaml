# Refreshes the BigQuery marts on a schedule by running `dbt build` in-cluster.
# Every 2 minutes: the marts are short rolling windows and a demo runs only a
# little while, so a tight cadence shows them filling up live during recording.
# Keyless via Workload Identity (the telemetry-runtime KSA → runtime GSA, which
# has bigquery.dataEditor + jobUser). The lifecycle matches the cluster, which
# matches the data — no point refreshing marts when nothing is producing.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dbt-build
  namespace: telemetry
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid # never overlap two dbt runs
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: dbt-build
        spec:
          serviceAccountName: telemetry-runtime
          restartPolicy: Never
          containers:
            - name: dbt
              image: europe-west3-docker.pkg.dev/realtime-telemetry-gcp/telemetry/dbt:latest
              args: ["build"]
              env:
                - name: GCP_PROJECT
                  value: "realtime-telemetry-gcp"
                - name: BIGQUERY_DATASET
                  value: "telemetry"
                - name: BIGQUERY_LOCATION
                  value: "europe-west3"
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
