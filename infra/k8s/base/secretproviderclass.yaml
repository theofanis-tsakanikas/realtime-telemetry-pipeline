# Pulls the foundation's Secret Manager secrets through the GKE-managed Secrets
# Store CSI provider and syncs them into a Kubernetes Secret (telemetry-secrets)
# so pods can consume them as env vars via secretKeyRef. Auth is Workload
# Identity (the telemetry-runtime KSA → runtime GSA, which holds secretAccessor).
#
# The synced Secret is materialised when the first pod mounts this SPC; redis,
# grafana and spark all mount it and reference the synced keys.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: telemetry-secrets
  namespace: telemetry
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/realtime-telemetry-gcp/secrets/telemetry-redis-password/versions/latest"
        path: "redis-password"
      - resourceName: "projects/realtime-telemetry-gcp/secrets/telemetry-grafana-admin-password/versions/latest"
        path: "grafana-admin-password"
      - resourceName: "projects/realtime-telemetry-gcp/secrets/telemetry-slack-webhook-url/versions/latest"
        path: "slack-webhook-url"
  secretObjects:
    - secretName: telemetry-secrets
      type: Opaque
      data:
        - objectName: redis-password
          key: redis-password
        - objectName: grafana-admin-password
          key: grafana-admin-password
        - objectName: slack-webhook-url
          key: slack-webhook-url
