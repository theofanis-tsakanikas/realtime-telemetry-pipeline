# Kubernetes SA for every workload that needs Google APIs (Spark → BigQuery,
# the CSI driver → Secret Manager). Bound to the runtime GSA via Workload
# Identity — the binding (roles/iam.workloadIdentityUser) lives in the
# foundation Terraform. No key files anywhere.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: telemetry-runtime
  namespace: telemetry
  annotations:
    iam.gke.io/gcp-service-account: telemetry-stack-vm@realtime-telemetry-gcp.iam.gserviceaccount.com
