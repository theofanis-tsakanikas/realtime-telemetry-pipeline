# Tells GKE Managed Service for Prometheus (managed collection, on by default in
# Autopilot) to scrape the Spark driver's Prometheus endpoint. Metrics land in
# Cloud Monitoring and are queried back through the frontend below.
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: spark-metrics
  namespace: telemetry
spec:
  selector:
    matchLabels:
      app: spark-processor
  endpoints:
    # Trailing slash is required: Spark's PrometheusServlet 302-redirects
    # /metrics/prometheus → /metrics/prometheus/, and GMP does not follow
    # redirects (so the unslashed path scrapes nothing).
    - port: ui-metrics
      path: /metrics/prometheus/
      interval: 30s
