apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: telemetry

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - secretproviderclass.yaml
  - kafka/service.yaml
  - kafka/statefulset.yaml
  - schema-registry/deployment.yaml
  - redis/statefulset.yaml
  - simulator/deployment.yaml
  - spark/deployment.yaml
  - kafka-ui/deployment.yaml
  - redis-insight/deployment.yaml
  - grafana/deployment.yaml

# ConfigMaps generated from the SAME provisioning files the compose/VM stack uses
# (single source of truth). Generated from paths outside this dir, so render with
# `kubectl kustomize --load-restrictor=LoadRestrictionsNone` (see the Makefile).
configMapGenerator:
  - name: grafana-datasources
    files:
      - redis.yml=../../grafana/provisioning/datasources/redis.yml
      - prometheus.yml=../../grafana/provisioning/datasources/prometheus.yml
  - name: grafana-dash-provider
    files:
      - provider.yml=../../grafana/provisioning/dashboards/provider.yml
  - name: grafana-alerting
    files:
      - contactpoints.yaml=../../grafana/provisioning/alerting/contactpoints.yaml
      - policies.yaml=../../grafana/provisioning/alerting/policies.yaml
      - rules.yaml=../../grafana/provisioning/alerting/rules.yaml
  - name: grafana-dashboards
    files:
      - iot-sensors.json=../../grafana/dashboards/iot-sensors.json
      - pipeline-health.json=../../grafana/dashboards/pipeline-health.json
  - name: spark-metrics
    files:
      - metrics.properties=../../spark/metrics.properties

# Stack images live in Artifact Registry; override the tag here per build.
images:
  - name: europe-west3-docker.pkg.dev/realtime-telemetry-gcp/telemetry/simulator
    newTag: latest
  - name: europe-west3-docker.pkg.dev/realtime-telemetry-gcp/telemetry/spark
    newTag: latest
