# IoT sensor producer. Image built from docker/Dockerfile.simulator and pushed
# to Artifact Registry (kustomize overrides the tag).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator
  namespace: telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simulator
  template:
    metadata:
      labels:
        app: simulator
    spec:
      serviceAccountName: telemetry-runtime
      containers:
        - name: simulator
          image: europe-west3-docker.pkg.dev/realtime-telemetry-gcp/telemetry/simulator:latest
          env:
            - name: KAFKA_BROKER
              value: "kafka-broker:9092"
            - name: KAFKA_PARTITIONS
              value: "3"
            - name: SERIALIZATION_FORMAT
              value: "avro"
            - name: SCHEMA_REGISTRY_URL
              value: "http://schema-registry:8081"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 250m
              memory: 512Mi
