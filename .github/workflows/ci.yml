name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check scripts/ tests/ app/

      - name: Run tests
        run: pytest tests/ -v --cov --cov-report=term-missing

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose configuration
        run: docker compose -f infra/docker-compose.yml config --quiet

  dbt-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-dbt-${{ hashFiles('dbt/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-dbt-

      - name: Install dbt
        run: pip install -r dbt/requirements.txt

      # Offline parse: validates refs, sources, SQL templating and test config
      # without a BigQuery connection (env_var fallbacks resolve project/dataset).
      - name: dbt parse
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: "."
        run: dbt parse
