name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check scripts/ tests/ app/

      - name: Run tests
        run: pytest tests/ -v --cov --cov-report=term-missing

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate docker-compose configuration
        run: docker compose -f infra/docker-compose.yml config --quiet

  dbt-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-dbt-${{ hashFiles('dbt/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-dbt-

      - name: Install dbt
        run: pip install -r dbt/requirements.txt

      # Offline parse: validates refs, sources, SQL templating and test config
      # without a BigQuery connection (env_var fallbacks resolve project/dataset).
      - name: dbt parse
        working-directory: dbt
        env:
          DBT_PROFILES_DIR: "."
        run: dbt parse

  k8s-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install kustomize + kubeconform
        run: |
          mkdir -p "$HOME/bin"
          curl -sSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz | tar xz -C "$HOME/bin" kustomize
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz -C "$HOME/bin" kubeconform
          echo "$HOME/bin" >> "$GITHUB_PATH"

      # Render the stack and schema-check every object offline. CRDs without a
      # public schema (SecretProviderClass) are skipped, not failed.
      - name: Render + validate manifests
        run: |
          kustomize build --load-restrictor=LoadRestrictionsNone infra/k8s/base \
            | kubeconform -strict -ignore-missing-schemas -summary -kubernetes-version 1.30.0
