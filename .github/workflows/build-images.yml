name: Build images

# Build + push the stack images to Artifact Registry, decoupled from deploy.
# Runs only when something that goes INTO an image changes (path filters), plus
# on-demand. Tags each image with the commit SHA (immutable) and moves `latest`.
# Keyless via Workload Identity (the deployer SA has artifactregistry.writer).
on:
  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.simulator"
      - "docker/Dockerfile.spark"
      - "docker/Dockerfile.dbt"
      - "scripts/**"
      - "requirements.txt"
      - "dbt/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # OIDC token for WIF

concurrency:
  group: build-images
  cancel-in-progress: true

env:
  WORKLOAD_IDENTITY_PROVIDER: projects/64747416265/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: gha-deployer@realtime-telemetry-gcp.iam.gserviceaccount.com
  AR_HOST: europe-west3-docker.pkg.dev
  AR_REPO: europe-west3-docker.pkg.dev/realtime-telemetry-gcp/telemetry

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - { name: simulator, dockerfile: docker/Dockerfile.simulator }
          - { name: spark, dockerfile: docker/Dockerfile.spark }
          - { name: dbt, dockerfile: docker/Dockerfile.dbt }
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.AR_REPO }}/${{ matrix.image.name }}:latest
            ${{ env.AR_REPO }}/${{ matrix.image.name }}:${{ github.sha }}
