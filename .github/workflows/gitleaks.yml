name: gitleaks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    name: secret scan (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # scan the entire git history, not just HEAD
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
