# Optional local quality gate. Install once with `pip install pre-commit`,
# then `pre-commit install` to run these on every commit. CI enforces the
# same ruff check regardless, so hooks are a convenience, not a requirement.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        name: ruff (lint scripts/ tests/ app/)
        args: [--fix]

  # Secret scanning — blocks credentials/keys from being committed
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
